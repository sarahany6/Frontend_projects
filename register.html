<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <title>register page</title>
</head>

<body>
    <div class="signup">
          <h1>Register Form</h1>

            <form class="form">

            <div class ="form-group">

                <label for="name"> First Name</label>
                <input type="text" required id="first" placeholder="Enter ur first name">
                
                
                <label for="lastname">Last Name </label>
                <input type="text" required id="second" placeholder="Enter ur last name">
            </div>
            
            
                <label for="phone">Phone Number </label>
                <input type="number" required id="phone" placeholder="Enter ur phone number">
           
            
                <label for="email">Email</label>
                <input type="email" required id="email" placeholder="Enter ur Email">
            

             <label for="pass">Password </label>
                <input type="password" required id="pass" placeholder="Enter ur Password">
           

             <label for="confirmpass">Confirm Password</label>
                <input type="password" required id="confirmpass" placeholder="Confirm ur Password">
          

            <button class="btn-submit" type="submit">Submit</button>
            <p class="signin">Already have an account? <a href="login.html" target="_blank" style="color:rgb(77, 43, 249);;
    text-decoration: none; "> Login </a></p>
        </form>
    </div>    
</body>
</html>
